# Configuração do projeto Supabase — Seravie Campo
project_id = "seravie-campo"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "https://seraviecampo.com"
additional_redirect_urls = [
  "http://localhost:3000",
  "http://localhost:3000/auth/callback",
  "http://localhost:3000/**",
  "https://localhost:3000",
  "https://localhost:3000/auth/callback",
  "https://localhost:3000/**",
  "https://seraviecampo.com",
  "https://seraviecampo.com/auth/callback",
  "https://seraviecampo.com/**",
  "https://www.seraviecampo.com",
  "https://www.seraviecampo.com/auth/callback",
  "https://www.seraviecampo.com/**"
]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = false
